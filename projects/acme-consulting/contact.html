<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Acme Consulting</title>
  <link rel="stylesheet" href="/diego-claw/projects/acme-consulting/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container topbar">
      <a class="brand" href="/diego-claw/projects/acme-consulting/">Acme Consulting</a>
      <nav>
        <ul>
          <li><a href="/diego-claw/projects/acme-consulting/about.html">About Us</a></li>
          <li><a href="/diego-claw/projects/acme-consulting/services.html">Services</a></li>
          <li><a href="/diego-claw/projects/acme-consulting/events.html">Events/Calendar</a></li>
          <li><a class="active" href="/diego-claw/projects/acme-consulting/contact.html">Contact Us</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <h1>Contact Us</h1>
      <p class="muted">Tell us your challenge and we will get back to you within one business day.</p>

      <form>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Your name" />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@company.com" />

        <label for="company">Company</label>
        <input id="company" name="company" type="text" placeholder="Company name" />

        <label for="message">How can we help?</label>
        <textarea id="message" name="message" placeholder="A short summary of what you need"></textarea>

        <div class="btn-row">
          <a class="btn" href="mailto:hello@acme-consulting.example?subject=Acme%20Consulting%20Inquiry">Email Acme Consulting</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
