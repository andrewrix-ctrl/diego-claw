<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to AI Literacy Tests</title>
  <link rel="canonical" href="https://andrewrix-ctrl.github.io/ai-literacy-hub/tests/quiz.html" />
</head>
<body>
  <p>AI Literacy Tests have moved. <a id="redirect-link" href="https://andrewrix-ctrl.github.io/ai-literacy-hub/tests/quiz.html">Open the new quiz</a>.</p>
  <script>
    const target = "https://andrewrix-ctrl.github.io/ai-literacy-hub/tests/quiz.html" + window.location.search;
    document.getElementById("redirect-link").href = target;
    window.location.replace(target);
  </script>
</body>
</html>
