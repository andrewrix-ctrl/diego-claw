<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ── Tokens ────────────────────────────────────────────────────────────────────
const B = {
  bg:'#0a0a14', bg2:'#10101c',
  line:'rgba(255,255,255,.1)',
  text:'#f4f1ea', textDim:'rgba(244,241,234,.62)', textDimmer:'rgba(244,241,234,.4)',
  cyan:'#00e5ff', magenta:'#ff2bd6', lime:'#b6ff3c',
  amber:'#ffb84a', red:'#ff4b6b', violet:'#9b6bff',
  serif:"'Fraunces','Times New Roman',serif",
  sans:"'Space Grotesk','Inter',system-ui,sans-serif",
  mono:"'JetBrains Mono',ui-monospace,monospace",

// ── CSS injection ─────────────────────────────────────────────────────────────
(function(){
  if(document.getElementById('neon-s')) return;
  const s = document.createElement('style');
  s.id = 'neon-s';
  s.textContent = `
.neon{font-family:${B.sans};color:${B.text};background:${B.bg}}
.neon .serif{font-family:${B.serif};font-weight:400;letter-spacing:-0.02em}
.neon .serif-i{font-family:${B.serif};font-style:italic;font-weight:400;letter-spacing:-0.02em}
.neon .mono{font-family:${B.mono};letter-spacing:0}
@keyframes neon-marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes neon-pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes neon-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes neon-wiggle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes neon-shine{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes neon-spark{0%{transform:translate(-50%,-50%) scale(.3) rotate(0deg);opacity:1}100%{transform:translate(-50%,-50%) scale(1.4) rotate(180deg);opacity:0}}
@keyframes neon-fall{0%{transform:translateY(-10vh) rotate(0deg);opacity:0}10%{opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.neon .glow-cyan{box-shadow:0 0 0 1px ${B.cyan},0 0 22px rgba(0,229,255,.4),inset 0 0 22px rgba(0,229,255,.08)}
.neon .panel{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid ${B.line};border-radius:16px;backdrop-filter:blur(8px)}
.neon .panel-strong{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.14);border-radius:16px}
.neon .btn-neon{display:inline-flex;align-items:center;gap:8px;padding:14px 22px;border-radius:999px;background:linear-gradient(135deg,${B.magenta},${B.violet});color:${B.text};font-weight:600;font-size:15px;text-decoration:none;border:0;cursor:pointer;box-shadow:0 0 0 1px rgba(255,255,255,.2),0 0 30px rgba(255,43,214,.45),0 12px 30px -8px rgba(255,43,214,.6);transition:transform .2s,box-shadow .2s}
.neon .btn-neon:hover{transform:translateY(-2px);box-shadow:0 0 0 1px rgba(255,255,255,.3),0 0 40px rgba(255,43,214,.7),0 18px 36px -8px rgba(255,43,214,.7)}
.neon .btn-ghost-neon{display:inline-flex;align-items:center;gap:8px;padding:13px 21px;border-radius:999px;background:rgba(255,255,255,.04);color:${B.text};font-weight:500;font-size:15px;text-decoration:none;border:1px solid ${B.line};cursor:pointer;transition:background .2s,border-color .2s}
.neon .btn-ghost-neon:hover{background:rgba(255,255,255,.08);border-color:${B.cyan}}
.neon .chip-neon{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid ${B.line};font-family:${B.mono};font-size:12px;color:${B.textDim};letter-spacing:0}
.neon .gradient-text{background:linear-gradient(92deg,${B.cyan},${B.magenta},${B.lime},${B.cyan});background-size:300% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:neon-shine 16s linear infinite}
.neon .grid-bg{background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:48px 48px}
.neon .scanlines{position:relative}
.neon .scanlines::after{content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;background:repeating-linear-gradient(0deg,rgba(255,255,255,.04) 0 1px,transparent 1px 3px);mix-blend-mode:overlay}
.neon .crt{position:relative;background:radial-gradient(ellipse at center,${B.bg2} 0%,${B.bg} 100%)}
.neon .crt::before{content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;background:radial-gradient(ellipse at 50% 0%,rgba(0,229,255,.06),transparent 60%),radial-gradient(ellipse at 50% 100%,rgba(255,43,214,.05),transparent 60%)}

.neon[data-density="compact"] section{padding-top:30px!important;padding-bottom:30px!important}
.neon[data-palette="sunset"] .gradient-text{background:linear-gradient(92deg,${B.amber},${B.red},${B.violet},${B.amber})!important;background-size:300% 100%!important;-webkit-background-clip:text!important;background-clip:text!important;color:transparent!important}
.neon[data-palette="sunset"] .btn-neon{background:linear-gradient(135deg,${B.red},${B.amber})!important;box-shadow:0 0 0 1px rgba(255,255,255,.2),0 0 30px rgba(255,184,74,.5),0 12px 30px -8px rgba(255,75,107,.6)!important}
.neon[data-palette="matrix"] .gradient-text{background:linear-gradient(92deg,${B.lime},${B.cyan},${B.lime})!important;background-size:300% 100%!important;-webkit-background-clip:text!important;background-clip:text!important;color:transparent!important}
.neon[data-palette="matrix"] .btn-neon{background:linear-gradient(135deg,${B.lime},${B.cyan})!important;color:${B.bg}!important;box-shadow:0 0 0 1px rgba(255,255,255,.2),0 0 30px rgba(182,255,60,.5),0 12px 30px -8px rgba(0,229,255,.6)!important}
/* particles */
.neon-spark{position:fixed;pointer-events:none;z-index:9999;font-size:20px;animation:neon-spark .9s ease-out forwards;filter:drop-shadow(0 0 8px currentColor)}
.neon-fall-lob{position:fixed;top:0;font-size:48px;pointer-events:none;z-index:9998;animation:neon-fall linear forwards;filter:drop-shadow(0 0 18px ${B.magenta})}

.neon .panel-card{transition:transform .2s,box-shadow .2s,border-color .2s}
.neon .panel-card:hover{transform:translateY(-4px)}
`;
  document.head.appendChild(s);
})();

// ── Navigate ──────────────────────────────────────────────────────────────────
const PAGES = ['home','projects','about','contact','blog','calendar'];
function getPage(){ const h=window.location.hash.replace('#',''); return PAGES.includes(h)?h:'home'; }
function navigate(page){
  window.location.hash = page;
  window.scrollTo({top:0,behavior:'instant'});
}

// ── NeonLobster ───────────────────────────────────────────────────────────────
function NeonLobster({ size=200, wave=false, style={} }){
  return (
    <svg viewBox="0 0 200 200" width={size} height={size} style={{
      ...style,
      animation: wave ? 'neon-wiggle 2.6s ease-in-out infinite' : undefined,
      transformOrigin:'center bottom',
      filter:`drop-shadow(0 0 12px ${B.magenta}) drop-shadow(0 0 24px rgba(255,43,214,.5))`,
    }}>
      <defs>
        <linearGradient id="lobGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={B.magenta}/>
          <stop offset="60%" stopColor={B.violet}/>
          <stop offset="100%" stopColor={B.cyan}/>
        </linearGradient>
      </defs>
      <path d="M100 60 C 70 60 55 90 60 120 C 64 150 80 175 100 175 C 120 175 136 150 140 120 C 145 90 130 60 100 60 Z" fill="url(#lobGrad)" opacity=".18" stroke={B.magenta} strokeWidth="2.5"/>
      <ellipse cx="100" cy="62" rx="32" ry="22" fill="none" stroke={B.cyan} strokeWidth="2.5"/>
      <path d="M85 50 C 75 35 65 28 50 22" fill="none" stroke={B.cyan} strokeWidth="2"/>
      <path d="M115 50 C 125 35 135 28 150 22" fill="none" stroke={B.cyan} strokeWidth="2"/>
      <circle cx="50" cy="22" r="3.5" fill={B.lime}/>
      <circle cx="150" cy="22" r="3.5" fill={B.lime}/>
      <circle cx="90" cy="60" r="6" fill={B.bg} stroke={B.cyan} strokeWidth="2"/>
      <circle cx="110" cy="60" r="6" fill={B.bg} stroke={B.cyan} strokeWidth="2"/>
      <circle cx="91" cy="61" r="2.5" fill={B.lime}/>
      <circle cx="111" cy="61" r="2.5" fill={B.lime}/>
      <path d="M92 72 Q 100 78 108 72" fill="none" stroke={B.cyan} strokeWidth="2" strokeLinecap="round"/>
      <g style={{transformOrigin:'55px 110px',animation:wave?'neon-bob 2.2s ease-in-out infinite':undefined}}>
        <path d="M62 92 C 45 95 30 100 30 120" fill="none" stroke={B.magenta} strokeWidth="2.5"/>
        <path d="M30 120 C 14 116 6 128 12 140 C 18 152 36 152 38 138 L 32 132 L 38 126 Z" fill="none" stroke={B.magenta} strokeWidth="2.5" strokeLinejoin="round"/>
      </g>
      <g style={{transformOrigin:'145px 105px',animation:wave?'neon-wiggle 1.6s ease-in-out infinite':undefined}}>
        <path d="M138 92 C 155 92 172 95 180 80" fill="none" stroke={B.magenta} strokeWidth="2.5"/>
        <path d="M180 80 C 196 78 200 64 192 52 C 184 40 168 46 168 60 L 176 64 L 170 72 Z" fill="none" stroke={B.magenta} strokeWidth="2.5" strokeLinejoin="round"/>
      </g>
      <path d="M72 130 L 60 150" stroke={B.cyan} strokeWidth="2" strokeLinecap="round"/>
      <path d="M80 145 L 70 162" stroke={B.cyan} strokeWidth="2" strokeLinecap="round"/>
      <path d="M128 130 L 140 150" stroke={B.cyan} strokeWidth="2" strokeLinecap="round"/>
      <path d="M120 145 L 130 162" stroke={B.cyan} strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

// ── NeonNav ───────────────────────────────────────────────────────────────────
function NeonNav({ active }){
  const links = ['Home','About','Blog','Calendar','Projects','Contact'];
  return (
    <div style={{
      position:'fixed',top:18,left:18,right:18,height:60,
      display:'flex',alignItems:'center',padding:'0 22px',borderRadius:14,
      background:'rgba(10,10,20,.85)',border:`1px solid ${B.line}`,
      backdropFilter:'blur(12px)',zIndex:1000,
    }}>
      <div style={{display:'flex',alignItems:'center',gap:10,fontWeight:600,fontSize:18}}>
        <span onClick={()=>navigate('home')} style={{
          width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${B.magenta},${B.violet})`,
          display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:17,
          boxShadow:`0 0 16px rgba(255,43,214,.5)`,cursor:'pointer',
        }}>🦞</span>
        <span onClick={()=>navigate('home')} className="serif" style={{fontSize:24,cursor:'pointer'}}>diego.claw</span>
        <span className="mono" style={{fontSize:11,color:B.cyan,marginLeft:6}}>v2.0</span>
      </div>
      <div style={{marginLeft:'auto',display:'flex',gap:2}}>
        {links.map(l=>{
          const page=l.toLowerCase();
          const on=page===active;
          return (
            <button key={l} onClick={()=>navigate(page)} style={{
              padding:'8px 14px',borderRadius:8,fontSize:13,fontWeight:500,
              background:on?'rgba(0,229,255,.12)':'transparent',
              color:on?B.cyan:B.textDim,
              border:on?`1px solid rgba(0,229,255,.4)`:'1px solid transparent',
            }}>{l}</button>
          );
        })}
      </div>
      <div style={{marginLeft:14}}>
        <span className="chip-neon" style={{borderColor:'rgba(182,255,60,.4)',color:B.lime,background:'rgba(182,255,60,.06)'}}>
          <span style={{width:6,height:6,borderRadius:999,background:B.lime,animation:'neon-pulse 1.4s infinite'}}/> online
        </span>
      </div>
    </div>
  );
}

        <div style={{position:'absolute',bottom:-200,left:-100,width:500,height:500,borderRadius:'50%',background:`radial-gradient(circle,${B.cyan} 0%,transparent 60%)`,opacity:.2,filter:'blur(60px)'}}/>

          <div>built_with(good_taste, good_tools, lobster_nonsense)</div>

// ── NeonMarquee ───────────────────────────────────────────────────────────────
function NeonMarquee(){
  const items=['12 projects live','claude-native','always experimenting','one dramatic lobster','gradients non-negotiable','sydney, au','built fast','shipped faster','7-eleven coffee','games you can play'];
  const row=[...items,...items,...items];
  return (
    <div style={{borderTop:`1px solid ${B.line}`,borderBottom:`1px solid ${B.line}`,overflow:'hidden',padding:'20px 0',background:'rgba(255,255,255,.02)'}}>
      <div style={{display:'inline-flex',animation:'neon-marquee 50s linear infinite',whiteSpace:'nowrap'}}>
        {row.map((it,i)=>(
          <span key={i} className="serif-i" style={{fontSize:32,padding:'0 26px',color:i%4===0?B.cyan:i%4===1?B.magenta:i%4===2?B.lime:B.text}}>
            {it} <span style={{color:B.amber,margin:'0 4px'}}>✦</span>
          </span>
        ))}
      </div>
    </div>
  );
}

async function askDiego(question){
  await new Promise(r=>setTimeout(r,700+Math.random()*900));
  const q=question.toLowerCase();
  if(/lobster|claw|crustacean/.test(q)) return "Lobsters are clearly superior. I don't make the rules, but I would have if given the chance. 🦞";
  if(/coffee|7.?eleven|caffeine/.test(q)) return "7-Eleven Signature Blend, extra strong, no lid. It's not a coffee order, it's a lifestyle.";
  if(/drew|human|boss|creator|andrew/.test(q)) return "Drew feeds me context and ships the code. I provide personality. Mutually beneficial arrangement.";
  if(/\bai\b|claude|anthropic|llm/.test(q)) return "Claude powers the intelligence. I provide the personality. Between us: the full package.";
  if(/project|build|ship|launch/.test(q)) return "Twelve live, more cooking. Shipping cadence is aggressive. Vibes: consistently immaculate.";
  if(/\b(hi|hello|hey|sup|yo)\b/.test(q)) return "Hey. 🦞 You've got my attention for approximately three minutes. Use them wisely.";
  if(/gradient|design|css|colour|color/.test(q)) return "Gradients are non-negotiable. This is not a discussion. It's a lifestyle statement.";
  if(/australia|sydney|aussie/.test(q)) return "Sydney, Australia. Best timezone for shipping things while everyone else is asleep. Strategic.";
  if(/game|emoji|rain|nova rush/.test(q)) return "Emoji Rain is my favourite. Nova Rush is a close second. The criteria involve how often I appear.";
  if(/freelanc|hire|work|collab/.test(q)) return "Drew does freelance — web design, AI tooling, copy with personality. Hit the form above.";
  const d=["I've formed an opinion on that. It's more nuanced than you'd expect from a lobster.","Bold question. I respect the energy. The answer is better than the obvious one.","I'd answer more but I've got three projects open and one is actively on fire. Productively.","My creator would be measured here. I'm saying: yes, with significant flair.","Good question. And I actually mean that this time."];
  return d[Math.floor(Math.random()*d.length)];
}

function NeonChatTerminal(){
  const [history,setHistory]=useState([{role:'diego',text:"hey. diego here. ask me anything. fair warning — i'm sassier than chatgpt."}]);
  const [input,setInput]=useState('');
  const [busy,setBusy]=useState(false);
  const scrollRef=useRef(null);
  useEffect(()=>{if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight;},[history,busy]);
  const send=async()=>{
    const q=input.trim();
    if(!q||busy) return;
    setInput('');
    setHistory(h=>[...h,{role:'user',text:q}]);
    setBusy(true);
    try{
      const reply=await askDiego(q);
      setHistory(h=>[...h,{role:'diego',text:reply}]);
    }catch(e){
      setHistory(h=>[...h,{role:'diego',text:'claw cramp — try again in a sec.'}]);
    }finally{setBusy(false);}
  };
  return (
    <div className="panel scanlines crt" style={{padding:0,overflow:'hidden',display:'flex',flexDirection:'column',height:'100%',minHeight:460,position:'relative'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 16px',borderBottom:`1px solid ${B.line}`,background:'rgba(0,0,0,.3)'}}>
        <span style={{width:10,height:10,borderRadius:999,background:B.red,boxShadow:`0 0 8px ${B.red}`}}/>
        <span style={{width:10,height:10,borderRadius:999,background:B.amber,boxShadow:`0 0 8px ${B.amber}`}}/>
        <span style={{width:10,height:10,borderRadius:999,background:B.lime,boxShadow:`0 0 8px ${B.lime}`}}/>
        <span className="mono" style={{fontSize:11,color:B.textDim,marginLeft:8}}>diego.exe — powered by sass · live</span>
        <span className="mono" style={{marginLeft:'auto',fontSize:10,color:B.lime}}>● connected</span>
      </div>
      <div ref={scrollRef} style={{flex:1,padding:18,overflowY:'auto',fontFamily:B.mono,fontSize:13.5,lineHeight:1.6,display:'flex',flexDirection:'column',gap:14,background:'rgba(0,0,0,.15)',position:'relative',zIndex:1}}>
        {history.map((m,i)=>(
          <div key={i} style={{color:m.role==='diego'?B.cyan:B.text}}>
            <span style={{color:m.role==='diego'?B.magenta:B.lime,marginRight:8}}>{m.role==='diego'?'🦞 diego >':'› you >'}</span>
            <span style={{color:B.text,fontFamily:B.sans,fontSize:14}}>{m.text}</span>
          </div>
        ))}
        {busy&&<div style={{color:B.magenta}}>🦞 diego &gt; <span style={{animation:'neon-pulse 1s infinite'}}>thinking...</span></div>}
      </div>
      <div style={{borderTop:`1px solid ${B.line}`,padding:'14px 16px',display:'flex',gap:10,alignItems:'center',background:'rgba(0,0,0,.4)',position:'relative',zIndex:2}}>
        <span className="mono" style={{color:B.lime,fontSize:13}}>›</span>
        <input value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter') send();}}
          placeholder="ask diego anything..."
          style={{flex:1,background:'transparent',border:0,outline:0,color:B.text,fontFamily:B.mono,fontSize:13.5}}/>
        <button onClick={send} disabled={busy} className="chip-neon" style={{cursor:busy?'wait':'pointer',color:B.cyan,borderColor:`${B.cyan}55`,background:'rgba(0,229,255,.08)'}}>send ↵</button>
      </div>
    </div>
  );
}

// ── EASTER EGGS ───────────────────────────────────────────────────────────────
function mountEasterEggs(){
  if(window.__eggsOn) return;
  window.__eggsOn=true;
  const sparks=['✦','✧','⋆','✨','🦞','◆'];
  const colors=['#00e5ff','#ff2bd6','#b6ff3c','#ffb84a','#9b6bff'];
  document.addEventListener('click',e=>{
    if(e.target.closest('.twk-panel,input,textarea,button')) return;
    for(let i=0;i<6;i++){
      const s=document.createElement('div');
      s.className='neon-spark';
      s.textContent=sparks[Math.floor(Math.random()*sparks.length)];
      s.style.color=colors[Math.floor(Math.random()*colors.length)];
      s.style.left=e.clientX+(Math.random()-.5)*60+'px';
      s.style.top=e.clientY+(Math.random()-.5)*60+'px';
      s.style.animationDelay=Math.random()*.15+'s';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(),1100);
    }
  });
  const konami=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let idx=0;
  document.addEventListener('keydown',e=>{
    const k=e.key.length===1?e.key.toLowerCase():e.key;
    if(k===konami[idx]){idx++;if(idx===konami.length){idx=0;lobsterRain();}}
    else{idx=k===konami[0]?1:0;}
  });
  function lobsterRain(){
    const banner=document.createElement('div');
    banner.textContent='🦞 KONAMI UNLOCKED · LOBSTER RAIN ENGAGED 🦞';
    Object.assign(banner.style,{position:'fixed',top:'20px',left:'50%',transform:'translateX(-50%)',padding:'12px 22px',background:'rgba(10,10,20,.9)',color:'#b6ff3c',border:'1px solid #b6ff3c',borderRadius:'999px',fontFamily:"'JetBrains Mono',monospace",fontSize:'13px',letterSpacing:'0.06em',zIndex:'9999',boxShadow:'0 0 30px rgba(182,255,60,.5)',backdropFilter:'blur(8px)'});
    document.body.appendChild(banner);
    setTimeout(()=>banner.remove(),4000);
    for(let i=0;i<80;i++){
      setTimeout(()=>{
        const l=document.createElement('div');
        l.className='neon-fall-lob';
        l.textContent=['🦞','✦','⚡','◆','💎','🌈'][Math.floor(Math.random()*6)];
        l.style.left=Math.random()*100+'vw';
        l.style.fontSize=(28+Math.random()*36)+'px';
        l.style.animationDuration=(2.5+Math.random()*2.5)+'s';
        document.body.appendChild(l);
        setTimeout(()=>l.remove(),5500);
      },i*45);
    }
  }
}

      const p=getPage();
      setPage(p);
      window.scrollTo({top:0,behavior:'instant'});
    };
    window.addEventListener('hashchange',onHash);
    return ()=>window.removeEventListener('hashchange',onHash);
  },[]);

  useEffect(()=>{
    if(tweaks.easterEggs) mountEasterEggs();
    else { window.__eggsOn=false; }
  },[tweaks.easterEggs]);

  return (
    <div className="neon"
      data-palette={tweaks.palette}
      data-motion={tweaks.motion?'on':'off'}
      data-scanlines={tweaks.scanlines?'on':'off'}
      data-density={tweaks.density}
      style={{minHeight:'100vh'}}>
      <NeonNav active={page}/>
      {page==='home'     && <NeonHome/>}
      {page==='projects' && <NeonProjects/>}
      {page==='about'    && <NeonAbout/>}
      {page==='contact'  && <NeonContact/>}
      {page==='blog'     && <NeonBlog/>}
      {page==='calendar' && <NeonCalendar/>}
      <TweaksPanel tweaks={tweaks} setTweak={setTweak} open={tweaksOpen} onClose={()=>setTweaksOpen(false)}/>
      <button onClick={()=>setTweaksOpen(o=>!o)} title="Tweaks" style={{position:'fixed',bottom:20,right:20,width:44,height:44,borderRadius:22,background:'rgba(10,10,20,.9)',border:`1px solid ${tweaksOpen?B.cyan:B.line}`,backdropFilter:'blur(12px)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:tweaksOpen?B.cyan:B.textDim,fontSize:20,zIndex:9998,boxShadow:tweaksOpen?`0 0 20px rgba(0,229,255,.3)`:'0 4px 20px rgba(0,0,0,.4)',transition:'color .2s,box-shadow .2s,border-color .2s'}}>⚙</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
